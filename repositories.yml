archive:
  suite: noble
  component: main
  origin: SafeLibs
  label: SafeLibs
  description: Memory-safe drop-in replacements packaged by SafeLibs for Ubuntu 24.04
  homepage: https://github.com/safelibs/apt
  base_url: https://safelibs.github.io/apt/
  key_name: safelibs
  pin_priority: 1001
  image: ubuntu:24.04
  install_packages:
    - ca-certificates
    - file
    - git
    - jq
    - python3
    - rsync
    - xz-utils

testing:
  discover:
    github_org: safelibs
    repository_prefix: port-
  default_build:
    mode: safe-debian
    artifact_globs:
      - "*.deb"
  allow_build_failures: true
  repository_overrides:
    - name: libc6
      build:
        mode: docker
        workdir: safe
        rustup_toolchain: stable
        packages:
          - build-essential
        command: |
          cargo run -p xtask -- package-deb --out "$SAFEAPTREPO_OUTPUT/debs"
          cp -v "$SAFEAPTREPO_OUTPUT"/debs/*.deb "$SAFEAPTREPO_OUTPUT"/
        artifact_globs:
          - "*.deb"

    - name: libjansson
      build:
        mode: docker
        workdir: .
        packages:
          - autoconf
          - automake
          - build-essential
          - cargo
          - dpkg-dev
          - libtool
          - pkg-config
          - rustc
        command: |
          bash safe/scripts/build-deb.sh
          mkdir -p "$SAFEAPTREPO_OUTPUT"
          cp -v safe/dist/*.deb "$SAFEAPTREPO_OUTPUT"/
        artifact_globs:
          - "*.deb"

repositories:
  - name: cjson
    github_repo: safelibs/port-cjson
    ref: refs/tags/build-de29489668c1
    verify_packages:
      - libcjson-dev
      - libcjson1
    verify_all_packages:
      - libcjson1
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: giflib
    github_repo: safelibs/port-giflib
    ref: refs/tags/build-8dd3019a8e99
    verify_packages:
      - libgif-dev
      - libgif7
    verify_all_packages:
      - libgif7
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libarchive
    github_repo: safelibs/port-libarchive
    ref: refs/tags/build-95a312cfb18f
    verify_packages:
      - libarchive-dev
      - libarchive-tools
      - libarchive13t64
    verify_all_packages:
      - libarchive13t64
    build:
      mode: safe-debian
      packages:
        - clang
        - lld
      setup: |
        export DEB_BUILD_OPTIONS="${DEB_BUILD_OPTIONS:+$DEB_BUILD_OPTIONS }nostrip noautodbgsym"
        python3 - <<'PY'
        from pathlib import Path

        build_rs = Path("safe/build.rs")
        needle = '        println!("cargo:rustc-cdylib-link-arg=-Wl,--export-dynamic-symbol=archive_set_error");\n'
        text = build_rs.read_text()
        if needle not in text:
            raise SystemExit(f"missing expected link export line in {build_rs}")
        build_rs.write_text(text.replace(needle, ""))

        rules = Path("safe/debian/rules")
        cargo_build = "cargo build --release"
        cargo_rustc = "cargo rustc --release -- -Clinker=clang -Clink-arg=-fuse-ld=lld"
        rules_text = rules.read_text()
        if cargo_build not in rules_text:
            raise SystemExit(f"missing expected cargo build line in {rules}")
        rules.write_text(rules_text.replace(cargo_build, cargo_rustc, 1))
        PY
      artifact_globs:
        - "*.deb"

  - name: libbz2
    github_repo: safelibs/port-libbz2
    ref: refs/tags/build-8c4b1bee6d25
    verify_packages:
      - bzip2-doc
      - bzip2
      - libbz2-1.0
      - libbz2-dev
    verify_all_packages:
      - libbz2-1.0
    build:
      mode: safe-debian
      setup: |
        python3 - <<'PY'
        from pathlib import Path
        import shutil

        repo_root = Path(".")
        copies = {
            "original/bzip2.c": "safe/bzip2.c",
            "original/bzip2recover.c": "safe/bzip2recover.c",
            "original/bzdiff": "safe/bzdiff",
            "original/bzgrep": "safe/bzgrep",
            "original/bzmore": "safe/bzmore",
            "original/bzip2.1": "safe/bzip2.1",
            "original/bzgrep.1": "safe/bzgrep.1",
            "original/bzmore.1": "safe/bzmore.1",
            "original/bzdiff.1": "safe/bzdiff.1",
            "original/manual.xml": "safe/manual.xml",
            "original/entities.xml": "safe/entities.xml",
            "original/manual.html": "safe/manual.html",
            "original/manual.pdf": "safe/manual.pdf",
            "original/manual.ps": "safe/manual.ps",
            "original/debian/bzexe": "safe/debian/bzexe",
            "original/debian/bzexe.1": "safe/debian/bzexe.1",
            "original/debian/bzip2-doc.docs": "safe/debian/bzip2-doc.docs",
            "original/debian/bzip2-doc.doc-base": "safe/debian/bzip2-doc.doc-base",
            "original/debian/bzip2-doc.info": "safe/debian/bzip2-doc.info",
        }

        for source_rel, dest_rel in copies.items():
            source = repo_root / source_rel
            dest = repo_root / dest_rel
            if not source.exists():
                raise SystemExit(f"missing required staged asset: {source}")
            dest.parent.mkdir(parents=True, exist_ok=True)
            shutil.copy2(source, dest)
        PY
      artifact_globs:
        - "*.deb"

  - name: libcsv
    github_repo: safelibs/port-libcsv
    ref: refs/tags/build-91e798441fdd
    verify_packages:
      - libcsv-dev
      - libcsv3
    verify_all_packages:
      - libcsv3
    build:
      mode: checkout-artifacts
      workdir: .
      artifact_globs:
        - "*.deb"

  - name: libexif
    github_repo: safelibs/port-libexif
    ref: refs/tags/build-9f7fcf07e370
    verify_packages:
      - libexif-dev
      - libexif-doc
      - libexif12
    verify_all_packages:
      - libexif12
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libjansson
    github_repo: safelibs/port-libjansson
    ref: refs/tags/build-32501acfb67e
    verify_packages:
      - libjansson-dev
      - libjansson4
    verify_all_packages:
      - libjansson4
    build:
      mode: docker
      workdir: .
      packages:
        - autoconf
        - automake
        - build-essential
        - cargo
        - dpkg-dev
        - libtool
        - pkg-config
        - rustc
      command: |
        bash safe/scripts/build-deb.sh
        mkdir -p "$SAFEAPTREPO_OUTPUT"
        cp -v safe/dist/*.deb "$SAFEAPTREPO_OUTPUT"/
      artifact_globs:
        - "*.deb"

  - name: libjpeg-turbo
    github_repo: safelibs/port-libjpeg-turbo
    ref: refs/tags/build-27e232c22936
    verify_packages:
      - libjpeg-turbo-progs
      - libjpeg-turbo8-dev
      - libjpeg-turbo8
      - libturbojpeg-java
      - libturbojpeg0-dev
      - libturbojpeg
    verify_all_packages:
      - libjpeg-turbo8
      - libturbojpeg
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libjson
    github_repo: safelibs/port-libjson
    ref: refs/tags/build-e25f4b433d01
    verify_packages:
      - libjson-c-dev
      - libjson-c5
    verify_all_packages:
      - libjson-c5
    build:
      workdir: .
      packages:
        - build-essential
        - cargo
        - cmake
        - debhelper
        - dpkg-dev
        - fakeroot
        - pkg-config
        - rustc
      command: |
        safe/tools/build-debs.sh \
          --workspace "$SAFEAPTREPO_SOURCE" \
          --out "$SAFEAPTREPO_OUTPUT"
      artifact_globs:
        - "*.deb"

  - name: liblzma
    github_repo: safelibs/port-liblzma
    ref: refs/tags/build-ebba850f8fae
    verify_packages:
      - liblzma-dev
      - liblzma5
    verify_all_packages:
      - liblzma5
    build:
      mode: safe-debian
      setup: |
        python3 - <<'PY'
        from pathlib import Path

        cargo_toml = Path("safe/Cargo.toml")
        old = 'crate-type = ["cdylib", "staticlib", "rlib"]\n'
        new = 'crate-type = ["staticlib", "rlib"]\n'
        text = cargo_toml.read_text()
        if old not in text:
            raise SystemExit(f"missing expected crate-type declaration in {cargo_toml}")
        cargo_toml.write_text(text.replace(old, new, 1))
        PY
      artifact_globs:
        - "*.deb"

  - name: libpng
    github_repo: safelibs/port-libpng
    ref: refs/tags/build-57fa3d117156
    verify_packages:
      - libpng-dev
      - libpng-tools
      - libpng16-16t64
    verify_all_packages:
      - libpng16-16t64
    build:
      mode: checkout-artifacts
      workdir: .
      artifact_globs:
        - "*.deb"

  - name: libsdl
    github_repo: safelibs/port-libsdl
    ref: refs/tags/build-14609a9a5844
    verify_packages:
      - libsdl2-2.0-0
      - libsdl2-dev
      - libsdl2-tests
    verify_all_packages:
      - libsdl2-2.0-0
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libsodium
    github_repo: safelibs/port-libsodium
    ref: refs/tags/build-d1d241340f2e
    verify_packages:
      - libsodium-dev
      - libsodium23
    verify_all_packages:
      - libsodium23
    build:
      mode: safe-debian
      packages:
        - autoconf
        - automake
        - libtool
      setup: |
        (
          cd original
          if [ -f Makefile ]; then
            make distclean || true
          fi
          autoreconf -ivf
          ./configure --disable-static
          make -j"$(nproc)"
        )
      artifact_globs:
        - "*.deb"

  - name: libtiff
    github_repo: safelibs/port-libtiff
    ref: refs/tags/build-9e34df3e07fc
    verify_packages:
      - libtiff-dev
      - libtiff-tools
      - libtiff6
      - libtiffxx6
    verify_all_packages:
      - libtiff6
    build:
      mode: safe-debian
      rustup_toolchain: stable-x86_64-unknown-linux-gnu
      setup: |
        python3 - <<'PY'
        from pathlib import Path

        rules = Path("safe/debian/rules")
        replacements = {
            "export CARGO_HOME := /home/yans/.cargo\n": "export CARGO_HOME := $(HOME)/.cargo\n",
            "export RUSTUP_HOME := /home/yans/.rustup\n": "export RUSTUP_HOME := $(HOME)/.rustup\n",
        }

        text = rules.read_text()
        for old, new in replacements.items():
            if old not in text:
                raise SystemExit(f"missing expected line in {rules}: {old.strip()}")
            text = text.replace(old, new, 1)
        rules.write_text(text)
        PY
      artifact_globs:
        - "*.deb"

  - name: libuv
    github_repo: safelibs/port-libuv
    ref: refs/tags/build-a2d0955c60f5
    verify_packages:
      - libuv1-dev
      - libuv1t64
    verify_all_packages:
      - libuv1t64
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libvips
    github_repo: safelibs/port-libvips
    ref: refs/tags/build-12543f951c24
    verify_packages:
      - gir1.2-vips-8.0
      - libvips-dev
      - libvips-doc
      - libvips-tools
      - libvips42t64
    verify_all_packages:
      - libvips-doc
    build:
      mode: docker
      workdir: .
      rustup_toolchain: 1.78
      packages:
        - build-essential
        - devscripts
        - dpkg-dev
        - equivs
        - fakeroot
      command: |
        cd safe
        mk-build-deps -i -r -t "apt-get -y --no-install-recommends" debian/control
        cd ..
        rm -rf build-check build-check-install
        meson setup build-check original --prefix "$SAFEAPTREPO_SOURCE/build-check-install"
        meson compile -C build-check
        meson install -C build-check
        cp -a build-check-install/lib/"$(dpkg-architecture -qDEB_HOST_MULTIARCH)"/libvips*.so* \
          build-check-install/lib/
        cd safe
        export DEB_BUILD_OPTIONS="${DEB_BUILD_OPTIONS:+$DEB_BUILD_OPTIONS }nocheck"
        dpkg-buildpackage -us -uc -b
        cp -v ../*.deb "$SAFEAPTREPO_OUTPUT"/
      artifact_globs:
        - "*.deb"

  - name: libwebp
    github_repo: safelibs/port-libwebp
    ref: refs/tags/build-d9437d8e3c87
    verify_packages:
      - libsharpyuv-dev
      - libsharpyuv0
      - libwebp-dev
      - libwebp7
      - libwebpdecoder3
      - libwebpdemux2
      - libwebpmux3
      - webp
    verify_all_packages:
      - libwebp7
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libxml
    github_repo: safelibs/port-libxml
    ref: refs/tags/build-8af9d2976d24
    verify_packages:
      - libxml2-dev
      - libxml2-utils
      - libxml2
      - python3-libxml2
    verify_all_packages:
      - libxml2
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libyaml
    github_repo: safelibs/port-libyaml
    ref: refs/tags/build-17f439b2dab0
    verify_packages:
      - libyaml-0-2
      - libyaml-dev
      - libyaml-doc
    verify_all_packages:
      - libyaml-0-2
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libzstd
    github_repo: safelibs/port-libzstd
    ref: refs/tags/build-64056ff8056f
    verify_packages:
      - libzstd-dev
      - libzstd1
      - zstd
    verify_all_packages:
      - libzstd1
    build:
      workdir: .
      rustup_toolchain: 1.94.0
      packages:
        - build-essential
        - cargo
        - cmake
        - curl
        - debhelper
        - dh-package-notes
        - dpkg-dev
        - fakeroot
        - help2man
        - less
        - liblz4-dev
        - liblzma-dev
        - python3
        - rustc
        - zlib1g-dev
      command: |
        bash safe/scripts/build-deb.sh
        cp -v safe/out/*.deb "$SAFEAPTREPO_OUTPUT"/
      artifact_globs:
        - "*.deb"
