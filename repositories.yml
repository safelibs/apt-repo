archive:
  suite: noble
  component: main
  origin: SafeLibs
  label: SafeLibs
  description: Memory-safe drop-in replacements packaged by SafeLibs for Ubuntu 24.04
  homepage: https://github.com/safelibs/apt-repo
  base_url: https://safelibs.github.io/apt-repo/
  key_name: safelibs
  pin_priority: 1001
  image: ubuntu:24.04
  install_packages:
    - ca-certificates
    - file
    - git
    - jq
    - python3
    - rsync
    - xz-utils

repositories:
  - name: cjson
    github_repo: safelibs/port-cjson
    ref: refs/tags/cjson/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: giflib
    github_repo: safelibs/port-giflib
    ref: refs/tags/giflib/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libarchive
    github_repo: safelibs/port-libarchive
    ref: refs/tags/libarchive/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libbz2
    github_repo: safelibs/port-libbz2
    ref: refs/tags/libbz2/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libcsv
    github_repo: safelibs/port-libcsv
    ref: refs/tags/libcsv/04-test
    build:
      mode: checkout-artifacts
      workdir: .
      artifact_globs:
        - "*.deb"

  - name: libjpeg-turbo
    github_repo: safelibs/port-libjpeg-turbo
    ref: refs/tags/libjpeg-turbo/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libjson
    github_repo: safelibs/port-libjson
    ref: refs/tags/libjson/04-test
    verify_packages:
      - libjson-c5
      - libjson-c-dev
    build:
      workdir: .
      packages:
        - build-essential
        - cargo
        - cmake
        - debhelper
        - dpkg-dev
        - fakeroot
        - pkg-config
        - rustc
      command: |
        safe/tools/build-debs.sh \
          --workspace "$SAFEAPTREPO_SOURCE" \
          --out "$SAFEAPTREPO_OUTPUT"
      artifact_globs:
        - "*.deb"

  - name: liblzma
    github_repo: safelibs/port-liblzma
    ref: refs/tags/liblzma/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libpng
    github_repo: safelibs/port-libpng
    ref: refs/tags/libpng/04-test
    verify_packages:
      - libpng16-16t64
      - libpng-dev
      - libpng-tools
    build:
      mode: checkout-artifacts
      workdir: .
      artifact_globs:
        - "*.deb"

  - name: libsdl
    github_repo: safelibs/port-libsdl
    ref: refs/tags/libsdl/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libsodium
    github_repo: safelibs/port-libsodium
    ref: refs/tags/libsodium/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libtiff
    github_repo: safelibs/port-libtiff
    ref: refs/tags/libtiff/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libvips
    github_repo: safelibs/port-libvips
    ref: refs/tags/libvips/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libwebp
    github_repo: safelibs/port-libwebp
    ref: refs/tags/libwebp/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libxml
    github_repo: safelibs/port-libxml
    ref: refs/tags/libxml/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libyaml
    github_repo: safelibs/port-libyaml
    ref: refs/tags/libyaml/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - "*.deb"

  - name: libzstd
    github_repo: safelibs/port-libzstd
    ref: refs/tags/libzstd/04-test
    verify_packages:
      - libzstd1
      - libzstd-dev
      - zstd
    build:
      workdir: .
      rustup_toolchain: 1.94.0
      packages:
        - build-essential
        - cargo
        - cmake
        - curl
        - debhelper
        - dh-package-notes
        - dpkg-dev
        - fakeroot
        - help2man
        - less
        - liblz4-dev
        - liblzma-dev
        - python3
        - rustc
        - zlib1g-dev
      command: |
        bash safe/scripts/build-deb.sh
        cp -v safe/out/*.deb "$SAFEAPTREPO_OUTPUT"/
      artifact_globs:
        - "*.deb"
