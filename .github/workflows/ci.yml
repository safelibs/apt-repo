name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-verify:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.SAFELIBS_REPO_TOKEN }}
      BASE_URL: https://safelibs.github.io/apt-repo/
    steps:
      - uses: actions/checkout@v4

      - name: Check required CI secret
        run: |
          test -n "${GH_TOKEN}" || {
            echo "SAFELIBS_REPO_TOKEN is required to clone private safelibs/port-* repos" >&2
            exit 1
          }

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg python3-yaml

      - name: Unit tests
        run: make test

      - name: Build Pages site
        run: make build-site

      - name: Verify apt repo in Ubuntu 24.04 Docker
        run: make verify-docker
