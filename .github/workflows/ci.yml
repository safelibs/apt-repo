name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  preflight:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.SAFELIBS_REPO_TOKEN }}
    outputs:
      has_repo_token: ${{ steps.check.outputs.has_repo_token }}
    steps:
      - id: check
        run: |
          if test -n "${GH_TOKEN}"; then
            echo "has_repo_token=true" >>"${GITHUB_OUTPUT}"
          else
            echo "has_repo_token=false" >>"${GITHUB_OUTPUT}"
          fi

  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg python3-yaml

      - name: Unit tests
        run: make test

  build-and-verify:
    if: ${{ needs.preflight.outputs.has_repo_token == 'true' }}
    needs:
      - preflight
      - unit-tests
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.SAFELIBS_REPO_TOKEN }}
      BASE_URL: https://safelibs.github.io/apt-repo/
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg python3-yaml

      - name: Build Pages site
        run: make build-site

      - name: Verify apt repo in Ubuntu 24.04 Docker
        run: make verify-docker
