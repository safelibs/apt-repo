name: pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ secrets.SAFELIBS_REPO_TOKEN }}
      SAFEAPTREPO_GPG_PRIVATE_KEY: ${{ secrets.SAFEAPTREPO_GPG_PRIVATE_KEY }}
      SAFEAPTREPO_GPG_PASSPHRASE: ${{ secrets.SAFEAPTREPO_GPG_PASSPHRASE }}
      SAFEDEBREPO_GPG_PRIVATE_KEY: ${{ secrets.SAFEDEBREPO_GPG_PRIVATE_KEY }}
      SAFEDEBREPO_GPG_PASSPHRASE: ${{ secrets.SAFEDEBREPO_GPG_PASSPHRASE }}
      BASE_URL: https://safelibs.github.io/apt-repo/
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          missing=0
          if test -z "${GH_TOKEN}"; then
            echo "Missing required repository secret: SAFELIBS_REPO_TOKEN" >&2
            missing=1
          fi

          if test -z "${SAFEAPTREPO_GPG_PRIVATE_KEY:-${SAFEDEBREPO_GPG_PRIVATE_KEY:-}}"; then
            echo "Missing required repository secret: SAFEAPTREPO_GPG_PRIVATE_KEY (or legacy SAFEDEBREPO_GPG_PRIVATE_KEY)" >&2
            missing=1
          fi

          if test "${missing}" -ne 0; then
            exit 1
          fi

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg python3-yaml

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Pages site
        run: make build-site

      - name: Verify apt repo in Ubuntu 24.04 Docker
        run: make verify-docker

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: build
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-publication:
    runs-on: ubuntu-24.04
    needs: deploy
    env:
      PAGE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - name: Verify public apt repo endpoints
        run: |
          set -euo pipefail
          if test -z "${PAGE_URL}"; then
            echo "Deploy job did not expose a page URL." >&2
            exit 1
          fi

          targets=(
            "${PAGE_URL}"
            "${PAGE_URL}dists/noble/InRelease"
            "${PAGE_URL}safelibs.gpg"
          )

          for target in "${targets[@]}"; do
            echo "Checking ${target}"
            success=0
            for attempt in $(seq 1 30); do
              status=$(curl -fsS -o /dev/null -w '%{http_code}' "${target}" || true)
              if test "${status}" = "200"; then
                success=1
                break
              fi
              sleep 10
            done

            if test "${success}" -ne 1; then
              echo "Public Pages smoke test failed for ${target}" >&2
              exit 1
            fi
          done
