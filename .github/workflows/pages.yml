name: pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "23 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-24.04
    outputs:
      repo_specs: ${{ steps.matrix.outputs.repos }}
    env:
      GH_TOKEN: ${{ secrets.SAFELIBS_REPO_TOKEN }}
      SAFEAPTREPO_GPG_PRIVATE_KEY: ${{ secrets.SAFEAPTREPO_GPG_PRIVATE_KEY }}
      SAFEAPTREPO_GPG_PASSPHRASE: ${{ secrets.SAFEAPTREPO_GPG_PASSPHRASE }}
      SAFEDEBREPO_GPG_PRIVATE_KEY: ${{ secrets.SAFEDEBREPO_GPG_PRIVATE_KEY }}
      SAFEDEBREPO_GPG_PASSPHRASE: ${{ secrets.SAFEDEBREPO_GPG_PASSPHRASE }}
      BASE_URL: https://safelibs.github.io/apt/
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          missing=0
          if test -z "${GH_TOKEN}"; then
            echo "Missing required repository secret: SAFELIBS_REPO_TOKEN" >&2
            missing=1
          fi

          if test -z "${SAFEAPTREPO_GPG_PRIVATE_KEY:-${SAFEDEBREPO_GPG_PRIVATE_KEY:-}}"; then
            echo "Missing required repository secret: SAFEAPTREPO_GPG_PRIVATE_KEY (or legacy SAFEDEBREPO_GPG_PRIVATE_KEY)" >&2
            missing=1
          fi

          if test "${missing}" -ne 0; then
            exit 1
          fi

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg jq python3-yaml

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build Pages site
        run: make build-site

      - name: Compute verify matrix
        id: matrix
        run: |
          repos=$(jq -c '[.channels[].repositories[] | {name, path}]' site/manifest.json)
          if [[ -z "${repos}" || "${repos}" == "[]" ]]; then
            echo "manifest.json yielded an empty repository list" >&2
            exit 1
          fi
          echo "repos=${repos}" >>"${GITHUB_OUTPUT}"

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: apt-site
          path: site/
          retention-days: 1
          include-hidden-files: false

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  verify-local:
    needs: build
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.build.outputs.repo_specs) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends apt-utils gnupg python3-yaml

      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: apt-site
          path: site/

      - name: Verify ${{ matrix.repo.name }} (${{ matrix.repo.path }}) against local site
        run: |
          bash scripts/verify-in-ubuntu-docker.sh \
            "site" \
            "repositories.yml" \
            "${{ matrix.repo.name }}" \
            "${{ matrix.repo.path }}"

  deploy:
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    needs: verify-local
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-publication:
    needs:
      - build
      - deploy
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJSON(needs.build.outputs.repo_specs) }}
    env:
      PAGE_URL: ${{ needs.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Verify ${{ matrix.repo.name }} (${{ matrix.repo.path }}) against deployed site
        run: |
          bash scripts/verify-in-ubuntu-docker.sh \
            "${PAGE_URL%/}" \
            "repositories.yml" \
            "${{ matrix.repo.name }}" \
            "${{ matrix.repo.path }}"
